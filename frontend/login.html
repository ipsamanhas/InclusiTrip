<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InclusiTrip - Log In</title>

  <style>
    :root {
      --navy: #17172c;
      --cream: #f3ede2;
      --teal: #147f80;
      --teal-dark: #0c4d53;
      --teal-bright: #22c9ca;
      --gold: #f5ad37;
      --focus: #ffd54f;
      --text: #252536;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 90% 0%, rgba(34,201,202,0.12), transparent 28%),
        var(--cream);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 45%, var(--navy) 100%);
      color: white;
      padding: 1rem 2rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
    }

    .card {
      max-width: 650px;
      margin: 4rem auto;
      background: white;
      padding: 3rem;
      border-radius: 8px;
      border-top: 6px solid var(--teal);
      box-shadow: 0 18px 44px rgba(23,23,44,0.12);
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: var(--navy);
    }

    .subtitle {
      margin-bottom: 2rem;
      color: #555;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 1rem;
      border-radius: 8px;
      border: 2px solid #d6cec1;
      font-size: 1rem;
    }

    input[type="email"]:focus,
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--teal);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
    }

    .btn {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover,
    .btn:focus {
      background: var(--teal-dark);
    }

    .tip {
      background: rgba(34,201,202,0.13);
      border-left: 4px solid var(--gold);
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 8px;
    }

    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid var(--teal);
      background: rgba(34,201,202,0.13);
    }

    .status.error {
      border-left-color: var(--gold);
      background: #fff7e6;
    }

    .status[hidden] {
      display: none;
    }

    a {
      color: var(--teal);
      font-weight: bold;
    }

    a:focus,
    button:focus,
    input:focus {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
    }

    .skip-link:focus {
      left: 1rem;
      top: 1rem;
      background: white;
      color: black;
      padding: 1rem;
      z-index: 1000;
    }

    @media (max-width: 768px) {
      .card {
        margin: 2rem 1rem;
        padding: 2rem;
      }

      h1 {
        font-size: 2.3rem;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <nav aria-label="Main navigation">
      <div class="logo">InclusiTrip</div>

      <div class="nav-links">
        <a href="/">Home</a>
        <a href="#">About</a>
        <a href="#">Help</a>
      </div>
    </nav>
  </header>

  <main id="main-content">
    <section class="card" aria-labelledby="login-heading">
      <a href="/">Back</a>

      <h1 id="login-heading">Log In</h1>

      <p class="subtitle">Welcome back. Your accessible journey awaits.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <div class="row">
          <label class="checkbox-label">
            <input type="checkbox" /> Show password
          </label>

          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Log In</button>
      </form>

      <div id="login-status" class="status" role="status" aria-live="polite" hidden></div>

      <div class="tip">
        <strong>Tip:</strong> Use the Tab key to move between fields and buttons.
      </div>

      <p>
        Need an account?
        <a href="/create-account">Create one</a>
      </p>
    </section>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
